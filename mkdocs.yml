site_name: pyEM
site_description: Expectation Maximization with MAP in Python for fitting cognitive computational models to behavioral data
site_url: https://shawnrhoadsphd.com/pyEM/
repo_url: https://github.com/shawnrhoads/pyEM
repo_name: shawnrhoads/pyEM
edit_uri: edit/main/docs/

exclude_docs: |
  CODE_REVIEW.md
  examples/params.py

theme:
  name: material
  logo: assets/pyem-avatar-dark-editable.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            docstring_options:
              warnings: false
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - API Reference:
      - Overview: api/index.md
      - EMModel & FitResult: api/emmodel.md
      - Core (EM, optimizer, comparison, priors): api/core.md
      - Utilities (math, stats, plotting): api/utils.md
      - Models — Reinforcement Learning: api/models/rl.md
      - Models — GLM / regression: api/models/glm.md
      - Models — Prospect Theory & Discounting: api/models/choice.md
      - Models — SDT, Bayes, DDM: api/models/other.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Examples:
      - General Linear Model: examples/glm.ipynb
      - Prospect Theory: examples/pt.ipynb
      - Discounting Models: examples/discounting.ipynb
      - Signal Detection Theory: examples/sdt.ipynb
      - Model-Free Reinforcement Learning: examples/rl_mf.ipynb
      - Model-Based Reinforcement Learning: examples/rl_mb.ipynb
      - Bayesian Inference: examples/bayes.ipynb
      - Drift-Diffusion Models: examples/ddm.ipynb
  - References: references.md
